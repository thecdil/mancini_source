<script src="https://thecdil.github.io/mancini_source/assets/lib/jquery-3.5.1.min.js"></script>

<!-- load leaflet dependencies -->
<script src="https://thecdil.github.io/mancini_source/assets/lib/leaflet/leaflet.js"></script>
<script src="https://thecdil.github.io/mancini_source/assets/lib/leaflet/fuse.min.js"></script>

<script src="https://thecdil.github.io/mancini_source/assets/lib/leaflet/leaflet.markercluster.freezable.js"></script>

<script>
(function(){
    /* add collection map data */
    var geodata = { "type": "FeatureCollection", "features": [ 
    
    { "type":"Feature", "geometry":{ "type":"Point", "coordinates":[5.718279,45.182234] }, "properties":
    { "title": "lett 04 Marie to Ortensia Stella", 
    "date_actual": "1672-07-14","creator": "Marie Mancini","recipient": "Ortensia Stella","location": "Grenoble, France","language": "french;english", "images":"DSCF8221;DSCF8222;DSCF8223", "id": "1672_07_14_mm2os" } }, 
    { "type":"Feature", "geometry":{ "type":"Point", "coordinates":[5.71828,45.182235] }, "properties":
    { "title": "lett 05 Marie to Lorenzo", 
    "date_actual": "1672-08-01","creator": "Marie Mancini","recipient": "Lorenzo Colonna","location": "Grenoble, France","language": "italian;english", "images":"DSCF8469;DSCF8470;DSCF8471", "id": "1672_08_01_mm2lc" } }, 
    { "type":"Feature", "geometry":{ "type":"Point", "coordinates":[-0.464817,49.095228] }, "properties":
    { "title": "lett 13 Marie to Lorenzo", 
    "date_actual": "1672-10-29","creator": "Marie Mancini","recipient": "Lorenzo Colonna","location": "Avenay, France","language": "italian;english", "images":"DSCF8485;DSCF8486;DSCF8487", "id": "1672_10_29_mm2lc" } }, 
    { "type":"Feature", "geometry":{ "type":"Point", "coordinates":[-0.464821,49.095232] }, "properties":
    { "title": "lett 14 Marie to Lorenzo", 
    "date_actual": "1672-12-02","creator": "Marie Mancini","recipient": "Lorenzo Colonna","location": "Avenay, France","language": "italian;english", "images":"DSCF8488;DSCF8489;DSCF8490", "id": "1672_12_02_mm2lc" } }, 
    { "type":"Feature", "geometry":{ "type":"Point", "coordinates":[7.676449,45.077702] }, "properties":
    { "title": "lett 33 Marie to Lorenzo", 
    "date_actual": "1673-08-07","creator": "Marie Mancini","recipient": "Lorenzo Colonna","location": "Turin, Italy","language": "italian;english", "images":"DSCF8532;DSCF8533;DSCF8534", "id": "1673_08_07_mm2lc" } }
    ]};

    /* init map and set zoom */
    if (window.location.hash) {
        /* if url has a hash, it is split by comma into coordinates that set the view */
        var hashfilter = decodeURIComponent(location.hash.substr(1));
        var latitudeHash = hashfilter.split(',')[0]
        var longitudeHash = hashfilter.split(',')[1]
        var map = L.map('map').setView([latitudeHash,longitudeHash],16);
    } else {
        var map = L.map('map').setView([43.753608,3.905236],5);
    }

    /* add map layer options */
    var Esri_WorldStreetMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri &mdash; Source: Esri, DeLorme, NAVTEQ, USGS, Intermap, iPC, NRCAN, Esri Japan, METI, Esri China (Hong Kong), Esri (Thailand), TomTom, 2012'
    });
    var Esri_NatGeoWorldMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/NatGeo_World_Map/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri &mdash; National Geographic, Esri, DeLorme, NAVTEQ, UNEP-WCMC, USGS, NASA, ESA, METI, NRCAN, GEBCO, NOAA, iPC',
        maxZoom: 16
    });
    var Esri_WorldImagery = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
    });
    /* add base map switcher */
    var baseMaps = {
        "Esri World StreetMap": Esri_WorldStreetMap,
        "Esri National Geo": Esri_NatGeoWorldMap,
        "Esri Imagery": Esri_WorldImagery
    };
    L.control.layers(baseMaps).addTo(map);
    /* load base map */
    Esri_WorldStreetMap.addTo(map);

    

    
    /* create cluster group */
    var markers = L.markerClusterGroup({ maxClusterRadius: 25, singleMarkerMode: true  });

    /* object popup function */
    function objectPopups(feature, layer) {
        
        /* create pop up */
        var itemHref = '/mancini_source/letters/' + feature.properties.id + '.html';
        if (feature.properties.youtube) {
            var thumbSrc = 'https://img.youtube.com/vi/' + feature.properties.youtube + '/default.jpg';
        } else {
            var photos = feature.properties.images;
            var photoArray = photos.split(';');
            var thumbSrc = 'https://www.lib.uidaho.edu/digital/objects/mancini/thumb/' + photoArray[1] + '_th.jpg';
        }
        var popupTemplate = '<h4><a class="text-dark" href="' + itemHref + '">' +
            feature.properties.title + '</a></h4><div class="text-center"><a class="btn btn-light" href="' + itemHref + 
            '" ><img class="mapthumb" src="' + thumbSrc + '" alt="item thumbnail"></a></div><p class="mt-0">';
        
        if (feature.properties["date_actual"]) {
            popupTemplate += '<strong>Date:</strong> ' + feature.properties["date_actual"] + '<br>'; 
        }
        
        if (feature.properties["creator"]) {
            popupTemplate += '<strong>Creator:</strong> ' + feature.properties["creator"] + '<br>'; 
        }
        
        if (feature.properties["recipient"]) {
            popupTemplate += '<strong>Recipient:</strong> ' + feature.properties["recipient"] + '<br>'; 
        }
        
        if (feature.properties["location"]) {
            popupTemplate += '<strong>Location:</strong> ' + feature.properties["location"] + '<br>'; 
        }
        
        if (feature.properties["language"]) {
            popupTemplate += '<strong>Language:</strong> ' + feature.properties["language"] + '<br>'; 
        }
        
        popupTemplate += '</p><div class="text-center"><a class="btn btn-light" href="' + itemHref + '" >View Item</a></div>';
        layer.bindPopup(popupTemplate);
    }
    function objectMarkers(feature,latlng) {
        var marker = L.marker(latlng);
        markers.addLayer(marker);
        return marker;
    }

    /* add objects from geoJson features */
    L.geoJson(geodata, {
        onEachFeature: objectPopups,
        pointToLayer: objectMarkers
    });
    map.addLayer(markers);
    
    

})();

</script>
